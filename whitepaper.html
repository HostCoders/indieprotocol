<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indie Protocol — Whitepaper</title>
  <meta name="description" content="Whitepaper for the Indie Protocol: a general-purpose smart contract framework for service tokenization, marketplace, and billing.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: rgba(255,255,255,0.1);
      --teal: #218178;
      --teal-light: #4bc0b5;
      --white: #f1f5f9;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--slate-300);
      -webkit-font-smoothing: antialiased;
      line-height: 1.75;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(15,23,42,0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header a {
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
    }
    header a:hover { color: var(--teal-light); }
    .back { font-size: 0.85rem; color: var(--slate-400); }
    .back:hover { color: var(--white); }

    #content {
      max-width: 52rem;
      margin: 0 auto;
      padding: 2rem 1.5rem 6rem;
    }
    #loading {
      text-align: center;
      padding: 4rem;
      color: var(--slate-400);
    }

    /* ═══ MARKDOWN STYLES ═══ */
    #content h1, #content h2, #content h3, #content h4 {
      color: var(--white);
      font-weight: 700;
      line-height: 1.3;
    }
    #content h1 { font-size: 2rem; margin: 3rem 0 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    #content h2 { font-size: 1.5rem; margin: 2.5rem 0 0.75rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
    #content h3 { font-size: 1.2rem; margin: 2rem 0 0.5rem; }
    #content h4 { font-size: 1.05rem; margin: 1.5rem 0 0.5rem; }
    #content p { margin: 0.75rem 0; }
    #content a { color: var(--teal-light); text-decoration: none; }
    #content a:hover { text-decoration: underline; }
    #content strong { color: var(--white); }
    #content ul, #content ol { padding-left: 1.5rem; margin: 0.75rem 0; }
    #content li { margin: 0.3rem 0; }

    #content code {
      background: rgba(255,255,255,0.08);
      color: var(--teal-light);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.88em;
    }
    #content pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin: 1rem 0;
    }
    #content pre code {
      background: transparent;
      color: var(--slate-300);
      padding: 0;
    }

    #content table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
      font-size: 0.9rem;
    }
    #content th, #content td {
      border: 1px solid var(--border);
      padding: 0.6rem 0.85rem;
      text-align: left;
    }
    #content th {
      background: rgba(255,255,255,0.04);
      color: var(--slate-400);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #content tr:nth-child(even) {
      background: rgba(255,255,255,0.02);
    }

    #content blockquote {
      border-left: 3px solid var(--teal);
      background: rgba(33,129,120,0.08);
      padding: 0.75rem 1rem;
      margin: 1rem 0;
      border-radius: 0 6px 6px 0;
    }
    #content blockquote p { margin: 0.25rem 0; }

    #content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    #content img { max-width: 100%; border-radius: 8px; }
  </style>
</head>
<body>
  <header>
    <a href="index.html">Indie Protocol</a>
    <a href="index.html" class="back">&larr; Back to overview</a>
  </header>
  <div id="content">
    <div id="loading">Loading whitepaper...</div>
  </div>
  <script>
    fetch('whitepaper/WHITEPAPER.md')
      .then(function(res) {
        if (!res.ok) throw new Error('Failed to load: ' + res.status);
        return res.text();
      })
      .then(function(md) {
        document.getElementById('content').innerHTML = marked.parse(md);
      })
      .catch(function(err) {
        document.getElementById('content').innerHTML =
          '<p style="color:#f87171;text-align:center;padding:4rem">' +
          'Failed to load whitepaper. ' + err.message + '</p>';
      });
  </script>
</body>
</html>
